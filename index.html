<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Surprise 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Mali:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="heartContainer"></div>

<div id="startScreen">
    <p>Tap anywhere to open 💗</p>
</div>

<!-- หน้าใส่รหัส -->
<div class="container" id="login">

<h1>🔒 หน้าลับ</h1>

<p class="hint"> คำใบ้: วันครบรอบ - ปีคศนะ 💌</p>

<div class="pin-container">
  <input class="pin" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1">
  <input class="pin" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1">
  <input class="pin" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1">
  <input class="pin" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1">
  <input class="pin" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1">
  <input class="pin" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1">
  <input class="pin" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1">
  <input class="pin" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1">
</div>

<button onclick="checkPassword()">เข้าสู่หน้าลับ</button>

<p id="error">รหัสไม่ถูก ลองอีกครั้งนะ 💔</p>

</div>

<!-- หน้าเซอร์ไพรส์ -->
<div class="container" id="secretPage" style="display:none;">

  <div id="mainCounter" style="margin-bottom:30px;font-size:20px; color:#ff4d88;"></div>

  <!-- TAB -->
  <div id="tabBar" style="display:flex; gap:10px; justify-content:center;">
    <button onclick="switchTab('1-month-ani')"> 1-Month Anniversary 🤍</button>
    <button onclick="switchTab('when-sad')"> กำลังใจมาส่งแย้ว 🥺🫶 <span style="color:red;">●</span></button>
  </div>

  <!-- CONTENT LOAD HERE -->
  <div id="contentArea"></div>

</div>

<script>

/* start screen */
document.getElementById("startScreen").onclick = () => {
  document.getElementById("startScreen").style.display = "none"
}

/* PIN */
const pins = document.querySelectorAll(".pin")
const correctPassword = "14022026"

pins.forEach((pin, index) => {

  pin.addEventListener("input", (e) => {

    const value = e.target.value

    if(!/^[0-9]$/.test(value)){
      e.target.value = ""
      return
    }

    e.target.value = "♡"
    e.target.dataset.value = value

    if(index < pins.length - 1){
      pins[index+1].focus()
    }

    checkPassword()
  })

  pin.addEventListener("keydown", (e) => {
    if(e.key === "Backspace"){
      if(pin.value === "" && index > 0){
        pins[index-1].focus()
        pins[index-1].value = ""
        delete pins[index-1].dataset.value
      }else{
        pin.value = ""
        delete pin.dataset.value
      }
    }
  })
})

function getPassword(){
  let pass = ""
  pins.forEach(pin=>{
    pass += pin.dataset.value || ""
  })
  return pass
}

function checkPassword(){
  const password = getPassword()
  if(password.length !== pins.length) return

  if(password === correctPassword){
    unlockEffect()
    setTimeout(()=>{
      document.getElementById("login").style.display="none"
      document.getElementById("secretPage").style.display="block"
    },600)
  }else{
    document.querySelector(".pin-container").classList.add("shake")
    setTimeout(()=>{
      document.querySelector(".pin-container").classList.remove("shake")
    },400)

    pins.forEach(pin=>{
      pin.value = ""
      delete pin.dataset.value
    })

    pins[0].focus()
  }
}

/* TAB LOAD */
function switchTab(tab){

  let file = ""

  if(tab === "1-month-ani"){
    file = "1-month-ani.html"
  }else if(tab === "when-sad"){
    file = "when-sad.html"
  }

  document.getElementById("mainCounter").style.display = "none"
  document.getElementById("tabBar").style.display = "none"

  fetch(file)
    .then(res => res.text())
    .then(data => {
      document.getElementById("contentArea").innerHTML = data
    })
}

/* Go back */
function goBack(){
  document.getElementById("contentArea").innerHTML = ""

  document.getElementById("mainCounter").style.display = "block"
  document.getElementById("tabBar").style.display = "flex"
}

/* heart effect */
function unlockEffect(){
  for(let i=0;i<20;i++){
    const heart=document.createElement("div")
    heart.innerHTML="💗"
    heart.style.position="fixed"
    heart.style.left=(40+Math.random()*20)+"vw"
    heart.style.bottom="50vh"
    heart.style.fontSize=(20+Math.random()*30)+"px"
    heart.style.animation="floatUp 3s linear"
    document.body.appendChild(heart)
    setTimeout(()=>heart.remove(),3000)
  }
}

/* background hearts */
function createHeart(){
  const heart=document.createElement("div")
  heart.className="heart"
  heart.innerHTML="🩷"
  heart.style.left=Math.random()*100+"vw"
  heart.style.fontSize=(15+Math.random()*25)+"px"
  document.getElementById("heartContainer").appendChild(heart)
  setTimeout(()=>heart.remove(),6000)
}
setInterval(createHeart,400)

/* Time counter */
const startDate = new Date("2026-02-14T00:00:00")

function updateCounter(){
  const now = new Date()
  const diff = now - startDate

  const seconds = Math.floor(diff / 1000)
  const minutes = Math.floor(seconds / 60)
  const hours = Math.floor(minutes / 60)
  const days = Math.floor(hours / 24)

  const remainHours = hours % 24
  const remainMinutes = minutes % 60
  const remainSeconds = seconds % 60

  document.getElementById("mainCounter").innerHTML =
    "ตั้งแต่วันที่เรามีกัน 🥺💞 <br><br>" +
    days + " วัน " +
    remainHours + " ชั่วโมง " +
    remainMinutes + " นาที " +
    remainSeconds + " วินาที 💖"
}

setInterval(updateCounter, 1000)
updateCounter()


let frame = 0
let interval

const messages = [
  "โอ๋ๆนะคนเก่ง ไม่เป็นไรน้า คะแนนมันไม่ได้บอกว่าเธอเก่งแค่ไหน เค้าภูมิใจในตัวเธอมากนะคะ (อย่าเถียงเค้า ก็เค้าภูมิใจในตัวเธออ่ะ)<span class='no-break'>&nbsp;🤍</span>",
  "ถึงอาจารย์จะไม่ใจดีกับเธอก็ไม่เป็นไรค่ะ เดี๋ยวเค้าไปตีอาจารย์ให้นะคะ ข้อหาที่มาแกล้งแฟนเค้า<span class='no-break'>&nbsp;😤</span>",
  "คะแนนอาจจะไม่ดี แต่แฟนเธอนี่ดีมากนะ (หมายถึงเค้าเอง<span class='no-break'>&nbsp;😏)</span>",
  "วันนี้เหนื่อยก็พักก่อนนะ แล้วค่อยไปต่อ เค้าจะอยู่ข้างๆเธอตลอดเลยนะคะ<span class='no-break'>&nbsp;🥺</span>",
  "ต่อให้เธอผิดหวังกับตัวเอง เค้าก็ยังภูมิใจในตัวเธออยู่ดีนะคะ ไม่เกี่ยวว่่าคะแนนจะมากจะน้อยเลย เพราะเธอเก่งที่สุดในสายตาเค้าตลอด<span class='no-break'>&nbsp;🫶🏻</span>",
  "เธออาจจะมองว่ามันยังไม่ดีพอ แต่สำหรับเค้า เธอทำได้ดีมากแล้วนะคะ อย่าลืมให้เครดิตตัวเองด้วยนะคะ ไม่งั้นเค้าจะตีจริงๆด้วย<span class='no-break'>&nbsp;🫂</span>",
  "ถ้าวันนี้มันทำให้เธอเสียความมั่นใจ เค้าอยากขอให้เธอค่อยๆกลับมาเชื่อในตัวเองอีกครั้งนะคะ เพราะเธอเก่งมากจริงๆ<span class='no-break'>&nbsp;🤍</span>"
]

const images = [
  "when-sad-img/กลจ1.jpg",
  "when-sad-img/กลจ2.jpg",
  "when-sad-img/กลจ3.jpg",
  "when-sad-img/กลจ4.jpg",
  "when-sad-img/กลจ5.jpg",
  "when-sad-img/กลจ6.jpg",
  "when-sad-img/กลจ7.jpg"
]

// 🎡 เริ่มหมุน
function startSpin(){
  clearInterval(interval)
  isSpinning = true

  interval = setInterval(()=>{
    frame = Math.floor(Math.random() * images.length)
    const img = document.getElementById("myImg")
    if(img) img.src = images[frame]
  }, 120)
}

function stopAndSend(){

  const btn = document.getElementById("btn")
  const hint = document.getElementById("retryHint")

  if(isSpinning){

    // ⛔ หยุด
    clearInterval(interval)
    isSpinning = false

    const chatBox = document.getElementById("chatBox")
    if(!chatBox) return

    const bubble = document.createElement("div")
    bubble.className = "chat-bubble"
    bubble.innerHTML = messages[frame]

    chatBox.appendChild(bubble)

    if(typeof createHeart === "function"){
      createHeart()
      createHeart()
    }

    // 👇 แสดง hint
    hint.style.display = "block"

    btn.innerText = "กดสุ่มใหม่ 🔄"

  }else{

  // ▶️ เริ่มใหม่
  startSpin()

  // 👇 เคลียร์ข้อความ
  const chatBox = document.getElementById("chatBox")
  chatBox.style.opacity = "0"

  setTimeout(()=>{
    chatBox.innerHTML = ""
    chatBox.style.opacity = "1"
  }, 200)

  // ซ่อน hint
  hint.style.display = "none"

  btn.innerText = "กดหยุดรับกำลังใจ 🎯"
}
}

// 🚀 เริ่มทันทีตอนโหลด fragment
setTimeout(startSpin, 50)


</script>

</body>
</html>
